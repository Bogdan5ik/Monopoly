<!DOCTYPE html>
<html>
<head>
    <title>Monopoly Game</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <style>
        .content { width: 1250px; height: 1500px; position: relative; background-image: url(bg.jpg); background-size: 100% 100%;}
        .boxs { width: 100px; height: 140px; border: 1px solid black; position: absolute; background: white; text-align: center; font-size: 12px; transition: 0.3s; }
        .top-bottom-side { width: 100px; height: 140px; }
        .left-right-side { width: 100px; height: 100px; }
        .img { width: 100%; height: 70px; object-fit: contain; }
        .player1, .player2 { width: 40px; position: absolute; z-index: 100; transition: 0.5s; }
        .player-info-1, .player-info-2 { width: 250px; padding: 20px; }
        .dice1, .dice2 { cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .companies { font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="d-flex">
        <div class="player-info-1">
            <h2>Игрок 1</h2>
            <img src="dice.png" class="dice1 w-50">
            <h2 class="chislo">0</h2>
            <h5>Деньги: <span class="player1_money">1500</span>$</h5>
            <div class="player1_companies">
                <p class="companies">Купленные компании:</p>
            </div>
        </div>

        <div class="content">
            <img src="player1.png" class="player1" style="top:145px; left:20px;">
            <img src="player2.png" class="player2" style="top:145px; left:70px;">

            <div class="boxs top-bottom-side" style="left: 20px; top:145px"><h4>START</h4></div>
            <div class="boxs top-bottom-side" style="left: 130px; top:145px"><img src="roztor.png" class="img"></div>
            <div class="boxs top-bottom-side" style="left: 240px; top:145px"><img src="aigul.png" class="img"></div>
            <div class="boxs top-bottom-side" style="left: 350px; top:145px">3</div>
            <div class="boxs top-bottom-side" style="left: 460px; top:145px"><img src="hozmarket.png" class="img"></div>
            <div class="boxs top-bottom-side" style="left: 570px; top:145px"><img src="bershka.png" class="img"></div>
            <div class="boxs top-bottom-side" style="left: 680px; top:145px">6</div>
            <div class="boxs top-bottom-side" style="left: 790px; top:145px"><img src="zara.png" class="img"></div>
            <div class="boxs top-bottom-side" style="left: 900px; top:145px"><img src="hm.png" class="img"></div>
            <div class="boxs top-bottom-side" style="left: 1010px; top:145px">9</div>

            <div class="boxs top-bottom-side" style="left: 1120px; top:145px">10<p>назад на -5</p></div>
            <div class="boxs left-right-side" style="left: 1120px; top: 300px"><img src="burgerking.png" class="img"></div>
            <div class="boxs left-right-side" style="left: 1120px; top: 410px"><img src="kfc.png" class="img"></div>
            <div class="boxs left-right-side" style="left: 1120px; top: 520px">13</div>
            <div class="boxs left-right-side" style="left: 1120px; top: 630px"><img src="mcdonalds.png" class="img"></div>
            <div class="boxs left-right-side" style="left: 1120px; top: 740px"><img src="amd.png" class="img"></div>
            <div class="boxs left-right-side" style="left: 1120px; top: 850px">16</div>
            <div class="boxs left-right-side" style="left: 1120px; top: 960px">17</div>
            <div class="boxs left-right-side" style="left: 1120px; top: 1070px"><img src="intel.png" class="img"></div>
            <div class="boxs left-right-side" style="left: 1120px; top: 1180px"><img src="nvidia.svg" class="img"></div>

            <div class="boxs top-bottom-side" style="left: 1120px; top: 1330px; background: red">20</div>
            <div class="boxs top-bottom-side" style="left: 1010px; top: 1330px">21</div>
            <div class="boxs top-bottom-side" style="left: 900px; top: 1330px"><img src="twitter.png" class="img"></div>
            <div class="boxs top-bottom-side" style="left: 790px; top: 1330px">23</div>
            <div class="boxs top-bottom-side" style="left: 680px; top: 1330px"><img src="microsoft.png" class="img"></div>
            <div class="boxs top-bottom-side" style="left: 570px; top: 1330px">25</div>
            <div class="boxs top-bottom-side" style="left: 460px; top: 1330px"><img src="epicgames.png" class="img"></div>
            <div class="boxs top-bottom-side" style="left: 350px; top: 1330px"><img src="ubisoft.png" class="img"></div>
            <div class="boxs top-bottom-side" style="left: 240px; top: 1330px">28</div>
            <div class="boxs top-bottom-side" style="left: 130px; top: 1330px"><img src="blizzard.svg" class="img"></div>

            <div class="boxs top-bottom-side" style="left: 20px; top: 1330px; background: red">30</div>
            <div class="boxs left-right-side" style="left: 20px; top: 1180px"><img src="lv.png" class="img"></div>
            <div class="boxs left-right-side" style="left: 20px; top: 1070px"><img src="chanel.png" class="img"></div>
            <div class="boxs left-right-side" style="left: 20px; top: 960px">33</div>
            <div class="boxs left-right-side" style="left: 20px; top: 850px"><img src="gucci.png" class="img"></div>
            <div class="boxs left-right-side" style="left: 20px; top: 740px">35</div>
            <div class="boxs left-right-side" style="left: 20px; top: 630px"><img src="amazon.png" class="img"></div>
            <div class="boxs left-right-side" style="left: 20px; top: 520px"><img src="apple.png" class="img"></div>
            <div class="boxs left-right-side" style="left: 20px; top: 410px">38</div>
            <div class="boxs left-right-side" style="left: 20px; top: 300px"><img src="spacex.png" class="img"></div>
        </div>

        <div class="player-info-2">
            <h2>Игрок 2</h2>
            <img src="dice.png" class="dice2 w-50">
            <h2 class="chislo2">0</h2>
            <h5>Деньги: <span class="player2_money">1500</span>$</h5>
            <div class="player2_companies">
                <p class="companies">Купленные компании:</p>
            </div>
        </div>
    </div>

    <script>
        let boxes = document.querySelectorAll(".boxs");
        let p1_view = document.querySelector(".player1_money");
        let p2_view = document.querySelector(".player2_money");
        
        let p1_money = 1500;
        let p2_money = 1500;
        let step1 = 0;
        let step2 = 0;
        let turn = 1;

        // База данных компаний (n - имя, p - цена, r - аренда, o - владелец 0/1/2)
        let data = [
            {n: "START", p: 0, r: 0, o: 0}, {n: "Rozmetov", p: 100, r: 20, o: 0},
            {n: "Aigul", p: 120, r: 25, o: 0}, {n: "Box 3", p: 0, r: 0, o: 0},
            {n: "Hozmarket", p: 140, r: 30, o: 0}, {n: "Bershka", p: 160, r: 35, o: 0},
            {n: "Box 6", p: 0, r: 0, o: 0}, {n: "Zara", p: 200, r: 45, o: 0},
            {n: "H&M", p: 220, r: 50, o: 0}, {n: "Box 9", p: 0, r: 0, o: 0},
            {n: "Назад", p: 0, r: 0, o: 0}, {n: "Burger King", p: 260, r: 60, o: 0},
            {n: "KFC", p: 280, r: 65, o: 0}, {n: "Box 13", p: 0, r: 0, o: 0},
            {n: "McDonalds", p: 320, r: 75, o: 0}, {n: "AMD", p: 340, r: 80, o: 0},
            {n: "Box 16", p: 0, r: 0, o: 0}, {n: "Box 17", p: 0, r: 0, o: 0},
            {n: "Intel", p: 400, r: 100, o: 0}, {n: "NVIDIA", p: 420, r: 110, o: 0},
            {n: "Box 20", p: 0, r: 0, o: 0}, {n: "Box 21", p: 0, r: 0, o: 0},
            {n: "Twitter", p: 450, r: 120, o: 0}, {n: "Box 23", p: 0, r: 0, o: 0},
            {n: "Microsoft", p: 500, r: 150, o: 0}, {n: "Box 25", p: 0, r: 0, o: 0},
            {n: "Epic Games", p: 550, r: 160, o: 0}, {n: "Ubisoft", p: 580, r: 170, o: 0},
            {n: "Box 28", p: 0, r: 0, o: 0}, {n: "Blizzard", p: 620, r: 180, o: 0},
            {n: "Box 30", p: 0, r: 0, o: 0}, {n: "LV", p: 700, r: 200, o: 0},
            {n: "Chanel", p: 720, r: 210, o: 0}, {n: "Box 33", p: 0, r: 0, o: 0},
            {n: "Gucci", p: 800, r: 250, o: 0}, {n: "Box 35", p: 0, r: 0, o: 0},
            {n: "Amazon", p: 900, r: 300, o: 0}, {n: "Apple", p: 1000, r: 400, o: 0},
            {n: "Box 38", p: 0, r: 0, o: 0}, {n: "SpaceX", p: 1200, r: 500, o: 0}
        ];

        function action(pNum, sPos) {
            let comp = data[sPos];
            
            // Спец клетка "Назад на 5"
            if (sPos === 10) {
                alert("Ой! Иди назад на 5 клеток.");
                if (pNum === 1) {
                    step1 -= 5;
                    movePlayer(1, step1);
                } else {
                    step2 -= 5;
                    movePlayer(2, step2);
                }
                return;
            }

            if (!comp || comp.p === 0) return;

            // Если компания ничья
            if (comp.o === 0) {
                if (confirm(`Купить ${comp.n} за ${comp.p}$?`)) {
                    if (pNum === 1 && p1_money >= comp.p) {
                        p1_money -= comp.p;
                        comp.o = 1;
                        document.querySelector(".player1_companies").innerHTML += `<div>${comp.n}</div>`;
                        boxes[sPos].style.background = "#8200eb";
                    } else if (pNum === 2 && p2_money >= comp.p) {
                        p2_money -= comp.p;
                        comp.o = 2;
                        document.querySelector(".player2_companies").innerHTML += `<div>${comp.n}</div>`;
                        boxes[sPos].style.background = "#70eb00";
                    } else { alert("Недостаточно средств!"); }
                }
            } 
            // Если компания чужая - платим аренду
            else if (comp.o !== pNum) {
                alert(`Это чужая собственность! Вы платите аренду: ${comp.r}$`);
                if (pNum === 1) {
                    p1_money -= comp.r;
                    p2_money += comp.r;
                } else {
                    p2_money -= comp.r;
                    p1_money += comp.r;
                }
            }
            
            // Обновляем табло
            p1_view.innerHTML = p1_money;
            p2_view.innerHTML = p2_money;
        }

        function movePlayer(pNum, step) {
            let pImg = document.querySelector(".player" + pNum);
            let offset = (pNum === 2) ? 40 : 0;
            pImg.style.left = (parseInt(boxes[step].style.left) + offset) + "px";
            pImg.style.top = boxes[step].style.top;
        }

        document.querySelector(".dice1").onclick = function() {
            if (turn !== 1) return alert("Сейчас ход Игрока 2!");
            let roll = Math.floor(Math.random() * 6) + 1;
            document.querySelector(".chislo").innerHTML = roll;
            
            step1 = (step1 + roll) % boxes.length;
            movePlayer(1, step1);
            
            setTimeout(() => { 
                action(1, step1); 
                turn = 2; 
            }, 600);
        };

        document.querySelector(".dice2").onclick = function() {
            if (turn !== 2) return alert("Сейчас ход Игрока 1!");
            let roll = Math.floor(Math.random() * 6) + 1;
            document.querySelector(".chislo2").innerHTML = roll;
            
            step2 = (step2 + roll) % boxes.length;
            movePlayer(2, step2);
            
            setTimeout(() => { 
                action(2, step2); 
                turn = 1; 
            }, 600);
        };
    </script>
</body>
</html>
